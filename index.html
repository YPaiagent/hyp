<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI助手登录系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#0a192f;color:#e6f1ff;padding:20px}
        .box{background:#172a46;padding:30px;border-radius:16px;max-width:400px;margin:50px auto;border:1px solid #00d4ff}
        .title{text-align:center;font-size:24px;margin-bottom:20px;color:#00d4ff}
        input{width:100%;padding:14px;margin:10px 0;border-radius:8px;border:none;background:#0f2947;color:white}
        button{width:100%;padding:14px;margin:10px 0;border-radius:8px;border:none;background:#00d4ff;color:#0a192f;font-weight:bold}
        .btn2{background:#1a365d;color:#00d4ff}
    </style>
</head>
<body>

<div class="box" id="page1">
    <div class="title">🤖 AI助手登录</div>
    <input id="uid" placeholder="输入4位ID登录">
    <button onclick="login()">登录</button>
    <button class="btn2" onclick="go(2)">手机号直接登录</button>
    <button class="btn2" onclick="go(3)">注册</button>
</div>

<div class="box" id="page2" style="display:none">
    <div class="title">📱 手机号登录</div>
    <input id="phone" placeholder="输入11位手机号">
    <button onclick="phoneLogin()">直接登录</button>
    <button class="btn2" onclick="go(1)">返回</button>
</div>

<div class="box" id="page3" style="display:none">
    <div class="title">👤 注册</div>
    <input id="rid" placeholder="4位ID">
    <input id="rname" placeholder="用户名">
    <input id="rphone" placeholder="手机号">
    <button onclick="reg()">注册</button>
    <button class="btn2" onclick="go(1)">返回</button>
</div>

<div class="box" id="page4" style="display:none">
    <div class="title">✅ 用户信息</div>
    <div id="info"></div>
    <button class="btn2" onclick="go(1)">退出</button>
</div>

<script>
let users = [{user_id:"1234",username:"测试账号",phone:"13800000000"}];

function go(n){
    document.querySelectorAll(".box").forEach(p=>p.style.display="none");
    document.getElementById("page"+n).style.display="block";
}

function mask(p){ return p.replace(/(\\d{3})\\d{4}(\\d{4})/,"$1****$2"); }

function login(){
    let u=users.find(x=>x.user_id==document.getElementById("uid").value);
    u?(document.getElementById("info").innerHTML=`用户名：${u.username}<br>ID：${u.user_id}<br>手机：${mask(u.phone)}`,go(4)):alert("用户不存在");
}

function phoneLogin(){
    let u=users.find(x=>x.phone==document.getElementById("phone").value);
    u?(document.getElementById("info").innerHTML=`用户名：${u.username}<br>ID：${u.user_id}<br>手机：${mask(u.phone)}`,go(4)):alert("手机号未注册");
}

function reg(){
    let id=document.getElementById("rid").value;
    let name=document.getElementById("rname").value;
    let phone=document.getElementById("rphone").value;
    if(id.length!=4||phone.length!=11)return alert("格式错误");
    if(users.some(x=>x.user_id==id))return alert("ID已存在");
    users.push({user_id:id,username:name,phone:phone});
    alert("注册成功！");go(1);
}
</script>
</body>
</html>
