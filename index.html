<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI助手 - 登录系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a192f;
            --secondary: #172a46;
            --accent: #64ffda;
            --highlight: #e6f1ff;
            --tech-primary: #00d4ff;
            --tech-secondary: #0099cc;
            --tech-accent: #64ffda;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary);
            color: var(--highlight);
            min-height: 100vh;
            position: relative;
        }
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden;
        }
        .bg-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #0f2947 50%, var(--secondary) 100%);
        }
        .grid-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,212,255,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.1) 1px,transparent 1px);
            background-size: 20px 20px; opacity: .3;
        }
        .main-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 1; }
        .login-card {
            background: rgba(23,42,70,.9); backdrop-filter: blur(10px); border-radius: 20px;
            padding: 40px; width: 100%; max-width: 400px;
            border: 1px solid rgba(0,212,255,.3); box-shadow: 0 8px 32px rgba(0,0,0,.3);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .logo {
            width: 80px; height: 80px; margin: 0 auto 20px; border-radius: 50%;
            border: 2px solid var(--tech-primary); display: flex; align-items: center; justify-content: center;
            background: rgba(0,212,255,.1);
        }
        .title { font-size: 28px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg,var(--tech-primary),var(--tech-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: rgba(230,241,255,.7); font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
        .form-input {
            width: 100%; padding: 12px 16px; border: 1px solid rgba(0,212,255,.3);
            border-radius: 8px; background: rgba(10,25,47,.5); color: var(--highlight);
        }
        .form-input:focus { outline: none; border-color: var(--tech-primary); box-shadow: 0 0 0 3px rgba(0,212,255,.1); }
        .info-box {
            background: rgba(0,212,255,.1); border: 1px solid rgba(0,212,255,.3);
            border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 13px;
        }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all .3s; }
        .btn-primary { background: linear-gradient(135deg,var(--tech-primary),var(--tech-secondary)); color: var(--primary); }
        .divider { margin: 25px 0; text-align: center; position: relative; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(0,212,255,.2); }
        .divider span { background: rgba(23,42,70,.9); padding: 0 16px; color: rgba(230,241,255,.5); font-size: 13px; position: relative; }
        .other-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option-btn {
            display: flex; align-items: center; justify-content: center; padding: 12px;
            background: rgba(10,25,47,.3); border: 1px solid rgba(0,212,255,.3);
            border-radius: 8px; color: var(--highlight); text-decoration: none; font-size: 14px;
        }
        .hidden { display: none; }
        @media (max-width: 480px) {
            .login-card { padding: 24px; margin: 16px; }
            .title { font-size: 24px; }
            .other-options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <div class="bg-gradient"></div>
        <div class="grid-pattern"></div>
    </div>
    <div class="main-container">
        <div id="loginContainer" class="login-card">
            <div class="header">
                <div class="logo">🤖</div>
                <h1 class="title">AI助手</h1>
                <p class="subtitle">请登录以访问高级功能</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户ID</label>
                    <input id="userId" class="form-input" placeholder="4位数字ID" maxlength="4" required>
                </div>
                <div class="info-box">ℹ️ 用户ID即为密码，请输入4位数字ID</div>
                <button type="submit" class="btn btn-primary">安全登录</button>
                <div class="divider"><span>其他选项</span></div>
                <div class="other-options">
                    <button type="button" id="phoneLoginBtn" class="option-btn">📱 手机号登录</button>
                    <button type="button" id="registerBtn" class="option-btn">➕ 注册账号</button>
                </div>
            </form>
        </div>
        <div id="phoneLoginContainer" class="login-card hidden">
            <div class="header">
                <div class="logo">📱</div>
                <h1 class="title">手机号登录</h1>
            </div>
            <form id="phoneLoginForm">
                <div class="form-group">
                    <label class="form-label">手机号码</label>
                    <input id="phoneNumber" class="form-input" placeholder="11位手机号" maxlength="11" required>
                </div>
                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div style="display:flex;gap:12px;">
                        <input id="verificationCode" class="form-input" placeholder="6位验证码" maxlength="6" required style="flex:1;">
                        <button type="button" id="sendCodeBtn" class="btn btn-secondary" style="padding:12px 16px;">发送</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
                <div style="text-align:center;margin-top:20px;">
                    <button type="button" id="backToLoginFromPhone" class="option-btn">← 返回登录</button>
                </div>
            </form>
        </div>
        <div id="registerContainer" class="login-card hidden">
            <div class="header">
                <div class="logo">👤</div>
                <h1 class="title">创建账号</h1>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">用户ID (4位数字)</label>
                    <input id="newUserId" class="form-input" maxlength="4" required>
                </div>
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input id="newUsername" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input id="newPhoneNumber" class="form-input" maxlength="11" required>
                </div>
                <div class="info-box">ℹ️ 用户ID即为密码</div>
                <button type="submit" class="btn btn-primary">注册</button>
                <div style="text-align:center;margin-top:20px;">
                    <button type="button" id="backToLoginFromRegister" class="option-btn">← 返回登录</button>
                </div>
            </form>
        </div>
        <div id="userInfoContainer" class="login-card hidden">
            <div class="header">
                <h1 class="title">用户信息</h1>
            </div>
            <div class="user-details">
                <div class="user-avatar">👤</div>
                <div id="displayUsername" class="user-name">用户名</div>
                <div id="displayUserId" class="user-id">ID: 0000</div>
            </div>
            <div class="info-item">
                <div class="info-text">
                    <div class="info-label">手机号</div>
                    <div id="displayPhone" class="info-value">138****8888</div>
                </div>
            </div>
            <div class="info-item">
                <div class="info-text">
                    <div class="info-label">注册时间</div>
                    <div id="displayCreateTime" class="info-value">2024-01-01</div>
                </div>
            </div>
            <button id="logoutBtn" class="btn btn-secondary" style="margin-top:20px;">退出登录</button>
        </div>
    </div>

    <script>
        const db = { users: [] };

        function showContainer(containerId) {
            const containers = document.querySelectorAll('.login-card');
            containers.forEach(c => c.classList.add('hidden'));
            document.getElementById(containerId).classList.remove('hidden');
        }

        function notify(msg, type="info") {
            alert(msg);
        }

        // 登录
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const uid = document.getElementById('userId').value;
            if (uid.length !== 4) { return notify("请输入4位数字ID", "error"); }
            const user = db.users.find(u => u.user_id === uid);
            if (!user) { return notify("ID不存在", "error"); }
            showUserInfo(user);
        });

        // 手机号登录
        document.getElementById('phoneLoginBtn').addEventListener('click', () => showContainer('phoneLoginContainer'));
        document.getElementById('backToLoginFromPhone').addEventListener('click', () => showContainer('loginContainer'));

        // 注册
        document.getElementById('registerBtn').addEventListener('click', () => showContainer('registerContainer'));
        document.getElementById('backToLoginFromRegister').addEventListener('click', () => showContainer('loginContainer'));

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const uid = document.getElementById('newUserId').value;
            const name = document.getElementById('newUsername').value;
            const phone = document.getElementById('newPhoneNumber').value;
            if (uid.length!==4 || name.length<2 || phone.length!==11) {
                return notify("格式错误");
            }
            if (db.users.find(u=>u.user_id===uid)) {
                return notify("ID已存在");
            }
            const newUser = {
                user_id: uid, username: name, phone: phone,
                created_at: new Date().toLocaleString()
            };
            db.users.push(newUser);
            notify("注册成功！");
            showUserInfo(newUser);
        });

        // 退出
        document.getElementById('logoutBtn').addEventListener('click', () => showContainer('loginContainer'));

        // 显示用户信息
        function showUserInfo(user) {
            document.getElementById('displayUsername').textContent = user.username;
            document.getElementById('displayUserId').textContent = "ID: " + user.user_id;
            document.getElementById('displayPhone').textContent = user.phone.replace(/(\d{3})\d{4}(\d{4})/, "$1****$2");
            document.getElementById('displayCreateTime').textContent = user.created_at.split(" ")[0];
            showContainer('userInfoContainer');
        }
    </script>
</body>
</html>
