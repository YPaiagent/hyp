<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI助手 - 登录系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a192f;
            --secondary: #172a46;
            --accent: #64ffda;
            --highlight: #e6f1ff;
            --tech-primary: #00d4ff;
            --tech-secondary: #0099cc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary);
            color: var(--highlight);
            min-height: 100vh;
        }
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a192f, #172a46);
            z-index: -1;
        }
        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(23,42,70,0.9);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid #00d4ff;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .logo {
            width: 80px; height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: rgba(0,212,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
        }
        .title {
            font-size: 28px;
            background: linear-gradient(90deg, #00d4ff, #64ffda);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 14px; }
        .form-input {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid rgba(0,212,255,0.3);
            background: rgba(10,25,47,0.6);
            color: white;
            font-size: 15px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            color: #0a192f;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
        .info-box {
            background: rgba(0,212,255,0.1);
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 13px;
        }
        .divider {
            text-align: center;
            margin: 25px 0;
            color: #8899b3;
        }
        .option-btn {
            width: 100%;
            padding: 12px;
            background: rgba(10,25,47,0.4);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 8px;
            color: white;
            margin-top: 10px;
            cursor: pointer;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="main-container">

        <!-- 登录 -->
        <div id="login" class="login-card">
            <div class="header">
                <div class="logo">🤖</div>
                <h1 class="title">AI助手登录</h1>
            </div>
            <input class="form-input" id="login_id" placeholder="输入4位数字ID" maxlength="4">
            <div class="info-box">ID就是登录密码</div>
            <button class="btn" onclick="login()">登录</button>
            <div class="divider">其他登录方式</div>
            <button class="option-btn" onclick="show('phone_login')">手机号直接登录</button>
            <button class="option-btn" onclick="show('register')">注册新账号</button>
        </div>

        <!-- 手机号登录（无验证码！） -->
        <div id="phone_login" class="login-card hidden">
            <div class="header">
                <div class="logo">📱</div>
                <h1 class="title">手机号登录</h1>
            </div>
            <input class="form-input" id="phone" placeholder="输入11位手机号" maxlength="11">
            <button class="btn" onclick="phoneLogin()">立即登录</button>
            <button class="option-btn" onclick="show('login')">返回</button>
        </div>

        <!-- 注册 -->
        <div id="register" class="login-card hidden">
            <div class="header">
                <div class="logo">👤</div>
                <h1 class="title">注册账号</h1>
            </div>
            <input class="form-input" id="reg_id" placeholder="4位数字ID" maxlength="4">
            <input class="form-input" id="reg_name" placeholder="用户名">
            <input class="form-input" id="reg_phone" placeholder="11位手机号" maxlength="11">
            <button class="btn" onclick="register()">注册</button>
            <button class="option-btn" onclick="show('login')">返回</button>
        </div>

        <!-- 用户信息 -->
        <div id="userinfo" class="login-card hidden">
            <div class="header">
                <h1 class="title">用户信息</h1>
            </div>
            <div id="info_content"></div>
            <button class="option-btn" onclick="logout()">退出登录</button>
        </div>

    </div>

    <script>
        // 全局共用数据库（真正互通！）
        const DB = {
            users: [
                { user_id: "1234", username: "测试用户", phone: "13800138000" }
            ]
        };

        function show(id) {
            document.querySelectorAll(".login-card").forEach(e => e.classList.add("hidden"));
            document.getElementById(id).classList.remove("hidden");
        }

        // 登录
        function login() {
            const id = document.getElementById("login_id").value.trim();
            const user = DB.users.find(u => u.user_id === id);
            if (user) {
                showUser(user);
            } else {
                alert("用户不存在");
            }
        }

        // 手机号登录（无验证码！）
        function phoneLogin() {
            const phone = document.getElementById("phone").value.trim();
            const user = DB.users.find(u => u.phone === phone);
            if (user) {
                showUser(user);
            } else {
                alert("手机号未注册");
            }
        }

        // 注册
        function register() {
            const id = document.getElementById("reg_id").value.trim();
            const name = document.getElementById("reg_name").value.trim();
            const phone = document.getElementById("reg_phone").value.trim();

            if (id.length !== 4 || phone.length !== 11) {
                alert("格式错误");
                return;
            }
            if (DB.users.some(u => u.user_id === id)) {
                alert("ID已存在");
                return;
            }
            DB.users.push({ user_id: id, username: name, phone: phone });
            alert("注册成功！");
            show("login");
        }

        // 显示信息
        function showUser(user) {
            document.getElementById("info_content").innerHTML = `
                <p>用户名：${user.username}</p>
                <p>ID：${user.user_id}</p>
                <p>手机号：${user.phone}</p>
            `;
            show("userinfo");
        }

        // 退出
        function logout() {
            show("login");
        }
    </script>
</body>
</html>
